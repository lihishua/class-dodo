<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FF8C00">
  <title>Admin Dashboard — CLASSQUAD</title>
  <link rel="icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="dashboard">

    <!-- ── Top Bar ── -->
    <header class="top-bar">
      <div class="top-end">
        <div class="profile-wrap" id="profile-wrap">
          <img src="assets/account.png" alt="פרופיל" class="account-icon" id="btn-profile-toggle">
          <div class="profile-dropdown" id="profile-dropdown">
            <div class="profile-dd-name" id="profile-dd-name"></div>
            <a href="profile.html" class="profile-dd-item">👤 הפרופיל שלי</a>
            <a href="class.html" class="profile-dd-item">🏫 הכיתה שלי</a>
            <button class="profile-dd-item profile-dd-logout" id="btn-logout">🚪 התנתקות</button>
          </div>
        </div>
        <img src="assets/header2 section.png" alt="הכיתה של אושרה ודורית" class="class-badge-img">

        <button class="btn-upload-pill" id="btn-upload">
          <img src="assets/upload button.png" alt="הוספת חומר" class="upload-btn-img">
        </button>
      </div>
      <div class="logo-pill">CLASSQUAD <span class="logo-admin-tag">– ADMIN</span></div>
    </header>

      <!-- Col LEFT: Dodo + English (same as student) -->
      <div class="col-left">
        <div class="dodo-card">
          <img src="assets/dodo-logo.png" alt="CLASS DODO" class="dodo-img">
        </div>
        <a href="english.html" class="english-card"></a>
      </div>

      <!-- Col MID: Math + Hebrew + Summary -->
      <div class="col-mid">
        <a href="math.html" class="math-card"></a>
        <a href="hebrew.html" class="hebrew-card"></a>
        <div class="folder-card" id="btn-summary"></div>
      </div>

      <!-- Col RIGHT: Events + HoF with reset -->
      <div class="col-right">
        <div class="events-card">
          <div class="events-header">
            <img src="assets/calendar section.png" alt="מה קורה מתי?" class="events-header-img">
          </div>
          <div id="events-preview">
            <p class="empty-state">...טוען</p>
          </div>
        </div>

        <div class="hof-card">
          <button class="btn-reset-hof" id="btn-reset-lb">
            <img src="assets/reset podium button.png" alt="איפוס רשימה" class="reset-btn-img">
          </button>
          <div id="hof-list" class="hof-list">
            <p class="hof-empty">...טוען</p>
          </div>
        </div>
      </div>


  </div>

  <!-- ════════════════════════════════════════════════════════
       AI UPLOAD MODAL
       ════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-ai" hidden>
    <div class="ai-modal">

      <!-- Step 1: Upload -->
      <div id="step-upload" class="ai-step">
        <div class="ai-modal-header">
          <h2 class="ai-modal-title">הוספת חומר</h2>
          <button class="modal-close-btn" id="upload-close">✕</button>
        </div>

        <div class="modal-tabs">
          <button class="modal-tab active" data-panel="panel-file">תמונה / PDF</button>
          <button class="modal-tab" data-panel="panel-text">הדבק טקסט</button>
        </div>

        <div id="panel-file" class="modal-panel">
          <div class="dropzone" id="dropzone">
            <input type="file" id="file-input" accept="image/*,.pdf" hidden>
            <div id="dropzone-inner" class="dropzone-inner">
              <div class="dropzone-icon">📎</div>
              <p class="dropzone-text">גרור קובץ לכאן</p>
              <p class="dropzone-hint">או לחץ לבחירה · תמונה / PDF</p>
            </div>
          </div>
        </div>

        <div id="panel-text" class="modal-panel" hidden>
          <textarea id="paste-text" class="paste-area" placeholder="הדבק כאן טקסט — שאלות, נושאי מבחן, אירועים, סיכום שבועי...&#10;&#10;AI יזהה מה זה ויטפל בהתאם ✨"></textarea>
        </div>

        <button class="btn-process" id="btn-process">✨ ניתוח עם AI</button>
      </div>

      <!-- Step 2: Processing -->
      <div id="step-processing" class="ai-step" hidden>
        <div class="processing-content">
          <div class="ai-spinner"></div>
          <p class="processing-title">קלוד מנתח את החומר</p>
          <p class="processing-hint" id="processing-hint">מזהה סוג ויוצר תוכן...</p>
        </div>
      </div>

      <!-- Step 3: Preview -->
      <div id="step-preview" class="ai-step" hidden>
        <div class="ai-modal-header">
          <h2 class="ai-modal-title">תצוגה מקדימה</h2>
          <button class="modal-close-btn" id="preview-close">✕</button>
        </div>

        <div class="preview-summary-box" id="preview-summary"></div>

        <div class="preview-label" id="preview-label">תצוגה מקדימה:</div>
        <div id="preview-questions"></div>

        <div class="preview-actions">
          <button class="btn-approve" id="btn-approve">אשר ✓</button>
          <button class="btn-cancel-ai" id="btn-cancel-ai">דחה</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════
       EVENTS PANEL
       ════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-events" hidden>
    <div class="panel-modal">
      <div class="panel-header">
        <h2>ניהול אירועים</h2>
        <button class="modal-close-btn" id="events-close">✕</button>
      </div>
      <form id="event-form" class="panel-form">
        <div class="form-row">
          <div class="form-group-sm">
            <label>תאריך</label>
            <input type="date" id="event-date" required>
          </div>
          <div class="form-group-sm">
            <label>כותרת</label>
            <input type="text" id="event-title" placeholder="מבחן מתמטיקה" required>
          </div>
        </div>
        <button type="submit" class="btn-submit">הוסף אירוע</button>
      </form>
      <div id="events-list" class="panel-list"></div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════
       USERS PANEL
       ════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-users" hidden>
    <div class="panel-modal">
      <div class="panel-header">
        <h2>משתמשים רשומים</h2>
        <button class="modal-close-btn" id="users-close">✕</button>
      </div>
      <div id="users-list" class="panel-list"></div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════
       SUMMARY PANEL
       ════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-summary" hidden>
    <div class="panel-modal">
      <div class="panel-header">
        <h2>סיכומים שבועיים</h2>
        <button class="modal-close-btn" id="summary-close">✕</button>
      </div>
      <form id="summary-form" class="panel-form">
        <div class="form-group-sm">
          <label>כותרת</label>
          <input type="text" id="summary-title" placeholder="סיכום שבועי — שבוע 12">
        </div>
        <div class="form-group-sm">
          <label>קובץ (PDF / תמונה)</label>
          <input type="file" id="summary-file" accept=".pdf,.jpg,.jpeg,.png,.gif,.webp" required>
        </div>
        <button type="submit" class="btn-submit">העלאה</button>
      </form>
      <div id="summaries-list" class="panel-list"></div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="js/api-keys.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
