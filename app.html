<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FF8C00">
  <title>THE DODOS</title>
  <link rel="icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="dashboard">

    <!-- ── Top Bar ── -->
    <div class="top-bar">
      <div class="top-bar-left">
        <span class="top-bar-logo">THE DODOS</span>
      </div>
      <div class="top-bar-right">
        <span class="class-badge">→ הכיתה של אושרה ודורית</span>
        <button class="btn-icon" id="btn-logout" title="התנתק">🚪</button>
      </div>
    </div>

    <!-- ── Greeting ── -->
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">
      <img src="assets/dodo-logo.png" alt="Dodo" style="width:100px;height:auto;">
      <div>
        <h1 id="user-greeting" style="font-size:22px;font-weight:700;color:var(--white)"></h1>
      </div>
    </div>

    <!-- ── Main Grid ── -->
    <div class="dash-grid">

      <!-- חשבוניאדה -->
      <a href="math.html" class="dash-card featured">
        <div class="card-icon">
          <img src="assets/icon-math.png" alt="חשבוניאדה">
        </div>
        <div class="card-title">חשבוניאדה</div>
      </a>

      <!-- אנגליתוש -->
      <a href="english.html" class="dash-card">
        <div class="card-icon">
          <img src="assets/icon-english.png" alt="אנגליתוש">
        </div>
        <div class="card-title english">אנגליתוש</div>
      </a>

      <!-- מה קורה מתי? -->
      <div class="events-card">
        <div class="events-header">
          <div class="events-title">
            📅 ?מה קורה מתי
          </div>
        </div>
        <div id="events-list">
          <p class="empty-state">...טוען</p>
        </div>
      </div>

      <!-- סיכום שבועי -->
      <div class="summary-card" id="btn-summary" style="grid-column: 1 / -1;">
        <img src="assets/icon-summary.png" alt="סיכום" class="summary-icon">
        <div class="summary-text">סיכום שבועי</div>
      </div>

    </div>

    <!-- Admin Link -->
    <a href="admin.html" class="admin-link" id="admin-link">
      ⚙️ ממשק מנהל
    </a>

  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
