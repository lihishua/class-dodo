<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FF8C00">
  <title>CLASSQUAD</title>
  <link rel="icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="dashboard">

    <!-- ── Top Bar ── -->
    <!-- RTL: first child → right, last child → left -->
    <header class="top-bar">
      <div class="top-end">
        <div class="profile-wrap" id="profile-wrap">
          <img src="assets/account.png" alt="פרופיל" class="account-icon" id="btn-profile-toggle">
          <div class="profile-dropdown" id="profile-dropdown">
            <div class="profile-dd-name" id="profile-dd-name"></div>
            <a href="profile.html" class="profile-dd-item">👤 הפרופיל שלי</a>
            <button class="profile-dd-item profile-dd-logout" id="btn-logout">🚪 התנתקות</button>
          </div>
        </div>
        <img src="assets/header2 section.png" alt="הכיתה של אושרה ודורית" class="class-badge-img">

      </div>
      <div class="logo-pill">CLASSQUAD</div>
    </header>

      <!-- Col 1 (rightmost in RTL): Dodo + English -->
      <div class="col-left">
        <div class="dodo-card">
          <img src="assets/dodo-logo.png" alt="CLASS DODO" class="dodo-img">
        </div>
        <a href="english.html" class="english-card"></a>
      </div>

      <!-- Col 2 (middle): Math + Hebrew + Summary -->
      <div class="col-mid">
        <a href="math.html" class="math-card"></a>
        <a href="hebrew.html" class="hebrew-card"></a>
        <div class="folder-card" id="btn-summary"></div>
      </div>

      <!-- Col 3 (leftmost in RTL): Events + Hall of Fame -->
      <div class="col-right">
        <div class="events-card">
          <div class="events-header">
            <img src="assets/calendar section.png" alt="מה קורה מתי?" class="events-header-img">
          </div>
          <div id="events-list">
            <p class="empty-state">...טוען</p>
          </div>
        </div>

        <div class="hof-card">
          <div id="hof-list" class="hof-list">
            <p class="hof-empty">...טוען</p>
          </div>
        </div>
      </div>


  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
