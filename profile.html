<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FF8C00">
  <title>הפרופיל שלי — CLASSQUAD</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="profile-page">

    <header class="profile-header">
      <button class="btn-back-profile" id="btn-back">← חזרה</button>
      <div class="profile-header-info">
        <div class="profile-page-name" id="profile-page-name"></div>
        <div class="profile-stats" id="profile-stats"></div>
      </div>
    </header>

    <div class="profile-content" id="profile-content">
      <p class="profile-loading">...טוען היסטוריה</p>
    </div>

    <div class="profile-footer">
      <button class="btn-delete-account" id="btn-delete-account">🗑️ מחיקת חשבון</button>
    </div>

  </div>

  <!-- Student delete confirmation modal -->
  <div class="modal-overlay" id="modal-delete" hidden>
    <div class="delete-modal">
      <p class="delete-modal-title">למחוק את החשבון?</p>
      <p class="delete-modal-body">הפעולה תמחק את כל הנתונים שלך לצמיתות ולא ניתן לבטלה.</p>
      <div class="delete-modal-actions">
        <button class="btn-confirm-delete" id="btn-confirm-delete">כן, מחק</button>
        <button class="btn-cancel-delete" id="btn-cancel-delete">ביטול</button>
      </div>
    </div>
  </div>

  <!-- Teacher delete modal (shown when class has students) -->
  <div class="modal-overlay" id="modal-delete-teacher" hidden>
    <div class="delete-modal delete-modal-teacher">
      <p class="delete-modal-title">היי <span id="delete-teacher-name"></span> 👋</p>
      <p class="delete-modal-body">יש תלמידים בכיתה שלך. האם אתה בטוח שברצונך למחוק את החשבון?</p>
      <p class="delete-modal-body">מה לעשות עם הכיתה?</p>
      <div class="delete-teacher-options">
        <button class="btn-delete-class" id="btn-delete-class">
          <span class="delete-opt-title">🗑️ מחק את הכיתה</span>
          <span class="delete-opt-desc">הכיתה והתלמידים יישארו ללא קבוצה</span>
        </button>
        <button class="btn-vacation-mode" id="btn-vacation-mode">
          <span class="delete-opt-title">🏖️ מצב חופשה</span>
          <span class="delete-opt-desc">הכיתה נשארת עד שמורה חדשה תיכנס כמנהל</span>
        </button>
      </div>
      <button class="btn-cancel-delete" id="btn-cancel-delete-teacher">ביטול</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
