<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FF8C00">
  <title>CLASSQUAD — כניסה</title>
  <link rel="icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <img src="assets/dodo-logo.png" alt="CLASSQUAD">
      </div>
      <h1 class="auth-title">CLASSQUAD</h1>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">כניסה</button>
        <button class="auth-tab" data-tab="register">הרשמה</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="login-form" class="auth-form active">
        <div id="login-error" class="auth-error"></div>
        <div id="login-success" class="auth-success"></div>
        <div class="form-group">
          <label>שם משתמש</label>
          <input type="text" id="login-username" required placeholder="lennyshua" autocomplete="username" autocapitalize="none">
        </div>
        <div class="form-group">
          <label>סיסמה</label>
          <input type="password" id="login-password" required placeholder="••••••">
        </div>
        <button type="submit" class="btn-primary">כניסה</button>
      </form>

      <!-- REGISTER FORM -->
      <form id="register-form" class="auth-form">
        <div id="register-error" class="auth-error"></div>
        <div id="register-success" class="auth-success"></div>

        <div class="form-group">
          <label>שם (יופיע באפליקציה)</label>
          <input type="text" id="reg-name" required placeholder="למשל: ליהי">
        </div>
        <div class="form-group">
          <label>שם משתמש</label>
          <input type="text" id="reg-username" required placeholder="idoshua" autocomplete="username" autocapitalize="none">
        </div>
        <div class="form-group">
          <label>סיסמה</label>
          <input type="password" id="reg-password" required placeholder="לפחות 6 תווים">
        </div>
        <div class="form-group">
          <label>אימות סיסמה</label>
          <input type="password" id="reg-password-confirm" required placeholder="הקלד שוב">
        </div>

        <!-- Join / Create toggle -->
        <div class="reg-type-toggle">
          <button type="button" class="reg-type-btn active" data-type="join">הצטרף לכיתה</button>
          <button type="button" class="reg-type-btn" data-type="create">צור כיתה (מורה)</button>
        </div>

        <!-- Join existing class -->
        <div id="panel-join" class="class-panel">
          <div class="form-group">
            <label>בחר כיתה</label>
            <select id="reg-class-select" class="auth-select">
              <option value="">...טוען כיתות</option>
            </select>
            <p class="no-classes-hint" id="no-classes-hint" style="display:none">
              אין כיתות עדיין — המורה צריך להירשם קודם וליצור כיתה
            </p>
          </div>
        </div>

        <!-- Create new class (teacher) -->
        <div id="panel-create" class="class-panel" hidden>
          <div class="form-group">
            <label>שם הכיתה</label>
            <input type="text" id="reg-class-name" placeholder="למשל: כיתה ד1">
          </div>
          <div class="form-group">
            <label>קוד מורה</label>
            <input type="text" id="reg-admin-code" placeholder="הקוד שקיבלת" autocomplete="off" autocapitalize="none">
          </div>
        </div>

        <button type="submit" class="btn-primary">הרשמה</button>
      </form>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
